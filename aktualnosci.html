
<!doctype html><html lang="pl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aktualności – MobilShot</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header class="header"><div class="brand"><img src="logo.png" class="logo"><div><h1>Aktualności</h1></div></div></header>
<nav style="padding:10px 24px"><a href="index.html">Start</a> <a href="o_nas.html">O nas</a> <a href="oferta.html">Oferta</a> <a href="cennik.html">Cennik</a> <a href="galeria.html">Galeria</a> <a href="kontakt.html">Kontakt</a></nav>
<main class="container">
<section class="card">
<h2>Dodaj aktualność</h2>
<label>Tytuł</label><br><input id="newsTitle" style="width:100%;padding:8px;margin-bottom:8px"><br>
<label>Treść</label><br><textarea id="newsBody" rows="5" style="width:100%;padding:8px"></textarea><br>
<button id="addNewsBtn" class="btn">Dodaj aktualność</button>
<button id="clearNewsBtn" class="btn" style="background:#b23;margin-left:8px">Usuń wszystkie</button>

<button class="btn" onclick="publishNews()" style="margin-top:10px">Publikuj aktualności (online)</button>
</section>


<section class="card" style="margin-top:12px">
<h2>Lista aktualności</h2>
<div id="newsList"></div>
</section>

</main>

<script>
function renderNews(list){
  const c=document.getElementById('newsList');
  if(!c) return;
  c.innerHTML="";
  list.forEach(item=>{
    const div=document.createElement("div");
    div.className="news-item";
    div.innerHTML=`<h3>${item.title}</h3><p>${item.body}</p><small>${new Date(item.date).toLocaleString()}</small>`;
    c.appendChild(div);
  });
}

fetch("aktualnosci.json")
  .then(r=>r.json())
  .then(data=>renderNews(data))
  .catch(()=>renderNews([]));

function publishNews(){
  fetch("aktualnosci.json")
    .then(r=>r.json())
    .then(data=>{
      const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download="aktualnosci.json"; a.click();
      alert("Plik aktualnosci.json pobrany. Wgraj go do GitHub → Upload.");
    });
}
</script>

</body></html>
